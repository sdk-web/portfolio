<!DOCTYPE html>
<html lang="ko" ng-app="portfolioApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <base href="/">
    <!-- AngularJS 1.8 -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/oclazyload/1.1.0/ocLazyLoad.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.min.js"></script>

    <!-- AngularJS Custom Scripts -->
    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/router.js"></script>
    <script src="/assets/js/controllers.js"></script>

    <link rel="stylesheet" href="/assets/css/reset.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body ng-controller="MainController" ng-class="bodyClass">
    <div class="main-container">
        <nav ng-if="!isHome">
            <a href="/" ng-class="{ active: currentPath === '/' }">Home</a>
            <a href="/about" ng-class="{ active: currentPath === '/about' || currentPath === '/publishing' }">정보</a>
            <a href="https://www.songdk.kro.kr" target="_blank" rel="noopener">Publishing</a>
            <a href="/php-dev" ng-class="{ active: currentPath === '/php-dev' }">PHP Dev</a>
        </nav>

        <div ng-view class="view-animate"></div>
    </div>
</body>

</html>
